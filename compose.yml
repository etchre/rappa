name: rappa

services:
  bot:
    build:
      context: .
    container_name: rappa-bot
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      LAVALINK_NODE_NAME: local
      LAVALINK_ADDRESS: lavalink:2333
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      LAVALINK_SECURE: "false"
      LAVALINK_PREMIUM_NODE_NAME: premium
      LAVALINK_PREMIUM_ADDRESS: lavalink-premium:2333
      LAVALINK_PREMIUM_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      LAVALINK_PREMIUM_SECURE: "false"
      LAVALINK_PREFERRED_NODE_NAME: local
      SYNC_GLOBAL_COMMANDS: ${SYNC_GLOBAL_COMMANDS:-true}
      CLEAR_GLOBAL_COMMANDS: ${CLEAR_GLOBAL_COMMANDS:-false}
    depends_on:
      - lavalink
      - lavalink-premium

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    container_name: rappa-lavalink
    restart: unless-stopped
    environment:
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    expose:
      - "2333"
    # Uncomment this if you want to inspect Lavalink from another machine.
    # ports:
    #   - "2333:2333"

  lavalink-premium:
    build:
      context: .
      dockerfile: Dockerfile.lavalink-premium
    container_name: rappa-lavalink-premium
    restart: unless-stopped
    environment:
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      YTDLP_COOKIES_FILE: /config/youtube-cookies.txt
      YTDLP_EXTRACTOR_ARGS: youtube:player_client=tv
      YTDLP_JS_RUNTIMES: node
    volumes:
      - ./lavalink/application-premium.yml:/opt/Lavalink/application.yml:ro
      - ${YOUTUBE_COOKIES_FILE:-./cookies-youtube-com.txt}:/config/youtube-cookies.txt
    expose:
      - "2333"
